<mat-card>
    <mat-card-content>
        <div class="header">
            <h2>สมัครสมาชิก</h2>
        </div>
        <form [formGroup]="regisForm" >
            <div class="name-input">
                <mat-form-field class="full-width" appearance="outline">
                    <mat-label>ชื่อ</mat-label>
                    <input matInput formControlName="firstname_user">
                    <mat-error *ngIf="regisForm.controls.firstname_user.invalid && regisForm.controls.firstname_user.touched">
                        กรุณาระบุชื่อ.
                    </mat-error>
                </mat-form-field>
            </div>
            <div>
                <mat-form-field class="full-width" appearance="outline">
                    <mat-label>นามสกุล</mat-label>
                    <input matInput formControlName="lastname_user">
                    <mat-error *ngIf="regisForm.controls.lastname_user.invalid && regisForm.controls.lastname_user.touched">
                        กรุณาระบุนามสกุล.
                    </mat-error>
                </mat-form-field>
            </div>
            <div>
                <mat-form-field class="full-width" appearance="outline">
                    <mat-label>เบอร์โทร</mat-label>
                    <input matInput formControlName="phone_user">
                    <mat-error *ngIf="regisForm.controls.phone_user.invalid && regisForm.controls.phone_user.touched">
                        กรุณาระบุเลขโทรศัพท์.
                    </mat-error>
                </mat-form-field>
            </div>
            <div>
                <mat-form-field class="full-width" appearance="outline">
                    <mat-label>อีเมล</mat-label>
                    <input matInput formControlName="email_user">
                    <mat-error *ngIf="regisForm.controls.email_user.invalid && regisForm.controls.email_user.touched">
                        กรุณาระบุอีเมล.
                    </mat-error>
                </mat-form-field>
            </div>
            <div>
                <mat-form-field class="full-width" appearance="outline">
                    <mat-label>รหัสผ่าน</mat-label>
                    <input matInput [type]="hide ? 'password' : 'text'" formControlName="password_user">
                    <mat-icon matSuffix (click)="hide = !hide">{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
                    <mat-error *ngIf="regisForm.controls.password_user.invalid && regisForm.controls.password_user.touched">
                        กรุณาระบุรหัสผ่าน.
                    </mat-error>
                </mat-form-field>
            </div>
            <div  >
                <div >
                    <button  type="submit" mat-flat-button color="primary" [disabled]="regisForm.invalid" (click)="onSubmit()" style="width: 100%;">ยืนยัน</button>
                </div>
            </div>  
        </form>
    </mat-card-content>
</mat-card>
