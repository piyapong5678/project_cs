<mat-toolbar color="primary" class="mat-elevation-z8 custom-toolbar">
    <button mat-icon-button (click)="sidenav.toggle()" id="menuIcon">
        <mat-icon>menu</mat-icon>
    </button>

    <span id="menuTitle">ForYourFish</span>

    <div class="spacer"></div>

    <div class="top-menu-group">
        <button mat-button routerLink="home" routerLinkActive="active-link" class="top-menu-item">
            <mat-icon>home</mat-icon> หน้าหลัก
        </button>

        <button mat-button routerLink="store/:id" routerLinkActive="active-link" class="top-menu-item">
            <mat-icon>storefront</mat-icon> ข้อมูลร้านค้า
        </button>

        <ng-container *ngIf="checkLoinUser">
            <button mat-button routerLink="order" routerLinkActive="active-link" class="top-menu-item">
                <mat-icon>account_balance_wallet</mat-icon> สถานะการสั่งซื้อ
            </button>

            <button mat-button routerLink="shopping-card" routerLinkActive="active-link" class="top-menu-item">
                <mat-icon [matBadge]="cartCount > 0 ? cartCount : null" matBadgeColor="warn">shopping_cart</mat-icon>
                ตะกร้าสินค้า
            </button>

            <button mat-button [matMenuTriggerFor]="adminMenu" *ngIf="roleCode === 'admin'"
                class="top-menu-item admin-btn">
                <mat-icon>admin_panel_settings</mat-icon> เจ้าของร้าน <mat-icon>expand_more</mat-icon>
            </button>

            <button mat-icon-button [matMenuTriggerFor]="userMenu" class="top-menu-item">
                <mat-icon>account_circle</mat-icon>
            </button>
        </ng-container>

        <button mat-raised-button color="accent" (click)="openAddLoginEmForm()" class="top-menu-item login-btn"
            *ngIf="!checkLoinUser">
            <mat-icon>login</mat-icon> เข้าสู่ระบบ
        </button>
    </div>
</mat-toolbar>

<mat-sidenav-container class="main-container">
    <mat-sidenav #sidenav [fixedInViewport]="true" [fixedTopGap]="64" mode="over" class="custom-sidenav">
        <div class="side-nav-content">
            <div class="nav-header">เมนูหลัก</div>

            <button mat-menu-item routerLink="home" (click)="sidenav.close()">
                <mat-icon>home</mat-icon> หน้าหลัก
            </button>

            <button mat-menu-item routerLink="store/:id" (click)="sidenav.close()">
                <mat-icon>storefront</mat-icon> ข้อมูลร้านค้า
            </button>

            <ng-container *ngIf="checkLoinUser">
                <button mat-menu-item routerLink="order" (click)="sidenav.close()">
                    <mat-icon>account_balance_wallet</mat-icon> สถานะการสั่งซื้อ
                </button>
                <button mat-menu-item routerLink="shopping-card" (click)="sidenav.close()">
                    <mat-icon>shopping_cart</mat-icon> ตะกร้าสินค้า
                </button>

                <ng-container *ngIf="roleCode === 'admin'">
                    <mat-divider></mat-divider>
                    <button mat-menu-item [matMenuTriggerFor]="adminMenu">
                        <mat-icon>admin_panel_settings</mat-icon> ระบบจัดการร้าน
                    </button>
                </ng-container>

                <mat-divider></mat-divider>
                
                <button mat-menu-item routerLink="profile" (click)="sidenav.close()">
                    <mat-icon>badge</mat-icon> บัญชีของฉัน
                </button>

                <button mat-menu-item routerLink="address" (click)="sidenav.close()">
                    <mat-icon>pin_drop</mat-icon> ที่อยู่จัดส่ง
                </button>

                <mat-divider></mat-divider>

                <button mat-menu-item (click)="logout(); sidenav.close()">
                    <mat-icon color="warn">logout</mat-icon> ออกจากระบบ
                </button>
            </ng-container>

            <button mat-menu-item (click)="openAddLoginEmForm(); sidenav.close()" *ngIf="!checkLoinUser">
                <mat-icon>login</mat-icon> เข้าสู่ระบบ
            </button>
        </div>
    </mat-sidenav>

    <mat-sidenav-content>
        <div class="page-wrapper">
            <router-outlet></router-outlet>
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>

<mat-menu #adminMenu="matMenu">
    <button mat-menu-item routerLink="store-management">
        <mat-icon>settings</mat-icon> แก้ไขข้อมูลร้านค้า
    </button>
    <button mat-menu-item routerLink="addmin-order">
        <mat-icon>confirmation_number</mat-icon> ยืนยันการสั่งซื้อ
    </button>
    <button mat-menu-item routerLink="manage-product">
        <mat-icon>inventory_2</mat-icon> จัดการสินค้า
    </button>
    <button mat-menu-item routerLink="profile-all">
        <mat-icon>people</mat-icon> บัญชีทั้งหมด
    </button>
</mat-menu>

<mat-menu #userMenu="matMenu">
    <button mat-menu-item routerLink="profile">
        <mat-icon>badge</mat-icon> บัญชีของฉัน
    </button>
    <button mat-menu-item routerLink="address">
        <mat-icon>pin_drop</mat-icon> ที่อยู่จัดส่ง
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()">
        <mat-icon color="warn">logout</mat-icon> ออกจากระบบ
    </button>
</mat-menu>
