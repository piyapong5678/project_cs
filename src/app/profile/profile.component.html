<div class="container mt-5 d-flex justify-content-center">
    <mat-card class="profile-edit-card shadow-sm border-0" style="max-width: 45rem; width: 100%; border-radius: 15px;">
        <mat-toolbar color="primary" style="border-radius: 15px 15px 0 0;">
            <mat-icon class="me-2">manage_accounts</mat-icon>
            <span>แก้ไขข้อมูลส่วนตัว</span>
        </mat-toolbar>

        <form [formGroup]="Profile" (ngSubmit)="onsubmit()" class="p-4">
            <div class="row">
                <!-- <div class="col-12 text-center mb-4">
                    <div class="position-relative d-inline-block">
                        <img src="https://bootdey.com/img/Content/avatar/avatar7.png"
                            class="avatar img-thumbnail rounded-circle shadow-sm"
                            style="width: 130px; height: 130px; object-fit: cover;" alt="avatar">
                        <div class="mt-2">
                            <input type="file" #fileInput style="display: none;" (change)="onFileSelected($event)">
                            <button type="button" mat-stroked-button color="primary" size="small"
                                (click)="fileInput.click()">
                                <mat-icon>photo_camera</mat-icon> เปลี่ยนรูปโปรไฟล์
                            </button>
                        </div>
                    </div>
                </div> -->

                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100 mb-2">
                        <mat-label>ชื่อ</mat-label>
                        <input matInput placeholder="กรอกชื่อของคุณ" formControlName="firstname_user">
                        <mat-icon matPrefix class="text-secondary me-2">person</mat-icon>
                        <mat-error *ngIf="Profile.controls.firstname_user.invalid">กรุณาระบุชื่อ</mat-error>
                    </mat-form-field>
                </div>

                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100 mb-2">
                        <mat-label>นามสกุล</mat-label>
                        <input matInput placeholder="กรอกนามสกุลของคุณ" formControlName="lastname_user">
                        <mat-icon matPrefix class="text-secondary me-2">badge</mat-icon>
                        <mat-error *ngIf="Profile.controls.lastname_user.invalid">กรุณาระบุนามสกุล</mat-error>
                    </mat-form-field>
                </div>

                <div class="col-12">
                    <mat-form-field appearance="outline" class="w-100 mb-2">
                        <mat-label>เบอร์โทรศัพท์</mat-label>
                        <input matInput placeholder="08X-XXX-XXXX" formControlName="phone_user">
                        <mat-icon matPrefix class="text-secondary me-2">phone</mat-icon>
                        <mat-error *ngIf="Profile.controls.phone_user.invalid">กรุณาระบุเบอร์โทรให้ถูกต้อง</mat-error>
                    </mat-form-field>
                </div>

                <div class="col-12">
                    <mat-form-field appearance="outline" class="w-100 mb-3">
                        <mat-label>อีเมล</mat-label>
                        <input matInput type="email" placeholder="example@mail.com" formControlName="email_user">
                        <mat-icon matPrefix class="text-secondary me-2">email</mat-icon>
                        <mat-error *ngIf="Profile.controls.email_user.invalid">กรุณาระบุอีเมลที่ถูกต้อง</mat-error>
                    </mat-form-field>
                </div>

                <div class="col-12 d-flex justify-content-center gap-3 mt-2">
                    <button type="button" mat-stroked-button color="warn" style="width: 120px;"
                        (click)="Profile.reset()">
                        ล้างข้อมูล
                    </button>
                    <button type="submit" mat-raised-button color="primary" style="width: 120px;"
                        [disabled]="Profile.invalid">
                        บันทึกข้อมูล
                    </button>
                </div>
            </div>
        </form>
    </mat-card>
</div>
