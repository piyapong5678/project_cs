<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-12">
            <mat-card class="search-card shadow-sm">
                <div class="p-3 d-flex align-items-center">
                    <mat-icon class="me-3 text-secondary">search</mat-icon>
                    <input type="search" (keyup)="onKeyAll($event)"
                        class="form-control border-0 bg-light rounded-pill px-4"
                        placeholder="ค้นหาชื่อ." style="height: 45px;">
                </div>
            </mat-card>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div *ngFor="let profileall of ProfileAllList">
            <div class="col h-100">
                <mat-card class="profile-card h-100 shadow-sm border-0" style="border-radius: 15px; overflow: hidden;">
                    <div class="status-header p-2 text-end"
                        [style.background-color]="profileall.status_user === 'Active' ? '#e8f5e9' : '#fff3e0'">
                        <span class="badge rounded-pill"
                            [ngClass]="profileall.status_user === 'Active' ? 'bg-success' : 'bg-warning text-dark'">
                            {{profileall.status_user}}
                        </span>
                    </div>

                    <div class="card-body p-4">
                        <!-- <div class="text-center mb-4">
                            <div
                                class="avatar-container d-inline-block p-1 rounded-circle border border-2 border-primary">
                                <img src="https://bootdey.com/img/Content/avatar/avatar7.png"
                                    class="rounded-circle img-fluid" alt="avatar"
                                    style="width: 100px; height: 100px; object-fit: cover;">
                            </div>
                            <h4 class="mt-3 fw-bold mb-0">{{profileall.firstname_user}} {{profileall.lastname_user}}
                            </h4>
                            <p class="text-muted small">ID: {{profileall.id_user}}</p>
                        </div> -->

                        <div class="info-list mb-4">
                            <div class="d-flex align-items-center mb-3">
                                <mat-icon class="me-3 text-primary" style="font-size: 20px;">phone</mat-icon>
                                <div>
                                    <div class="small text-muted">เบอร์โทรศัพท์</div>
                                    <div class="fw-medium">{{profileall.phone_user}}</div>
                                </div>
                            </div>
                            <div class="d-flex align-items-center mb-3 text-truncate">
                                <mat-icon class="me-3 text-primary" style="font-size: 20px;">email</mat-icon>
                                <div class="w-100 overflow-hidden">
                                    <div class="small text-muted">อีเมล</div>
                                    <div class="fw-medium text-truncate">{{profileall.email_user}}</div>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button mat-flat-button color="warn" class="rounded-pill"
                                (click)="deleteProfile(profileall.id_user)">
                                <mat-icon>delete_outline</mat-icon> ลบข้อมูลผู้ใช้
                            </button>
                        </div>
                    </div>
                </mat-card>
            </div>
        </div>
    </div>
</div>
